name: CI/CD

env:
  ANDROID_STUDIO_VERSION: "2025.3.4.7"

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Plugin Version Name (e.g. 1.0.1). If empty, the default version from gradle.properties is used.'
        required: false
        type: string
      release:
        description: 'Create a GitHub Release?'
        required: true
        type: boolean
        default: false
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build and release plugin
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Plugin Version
        id: resolve-version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version_name }}" ]]; then
            FINAL_VERSION="${{ inputs.version_name }}"
          else
            FINAL_VERSION=$(grep "^pluginVersion=" lottie-preview-plugin/gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          fi
          echo "VERSION=$FINAL_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Resolve Android Studio package name
        shell: bash
        run: |
          if [[ "$(uname -m)" == "arm64" ]]; then
            echo "ANDROID_STUDIO_PACKAGE=android-studio-panda4-patch1-mac_arm.dmg" >> "$GITHUB_ENV"
          else
            echo "ANDROID_STUDIO_PACKAGE=android-studio-panda4-patch1-mac.dmg" >> "$GITHUB_ENV"
          fi

      - name: Cache Android Studio Panda 4 Patch 1
        id: android-studio-cache
        uses: actions/cache@v4
        with:
          path: ~/android-studio-ci/${{ env.ANDROID_STUDIO_VERSION }}
          key: ${{ runner.os }}-${{ runner.arch }}-android-studio-${{ env.ANDROID_STUDIO_VERSION }}-${{ env.ANDROID_STUDIO_PACKAGE }}

      - name: Install Android Studio Panda 4 Patch 1
        shell: bash
        run: |
          set -euo pipefail

          version_dir="$HOME/android-studio-ci/${ANDROID_STUDIO_VERSION}"
          app_path="$version_dir/Android Studio.app"
          if [[ -d "$app_path" ]]; then
            echo "ANDROID_STUDIO_PATH=$app_path" >> "$GITHUB_ENV"
            exit 0
          fi

          mkdir -p "$version_dir"

          dmg_path="$version_dir/${ANDROID_STUDIO_PACKAGE}"
          mount_path="$RUNNER_TEMP/android-studio-mount"
          url="https://redirector.gvt1.com/edgedl/android/studio/install/${ANDROID_STUDIO_VERSION}/${ANDROID_STUDIO_PACKAGE}"

          curl --fail --location --retry 3 --output "$dmg_path" "$url"
          mkdir -p "$mount_path"
          hdiutil attach "$dmg_path" -mountpoint "$mount_path" -nobrowse -quiet
          ditto "$mount_path/Android Studio.app" "$app_path"
          hdiutil detach "$mount_path" -quiet

          echo "ANDROID_STUDIO_PATH=$app_path" >> "$GITHUB_ENV"

      - name: Build, verify, and package
        working-directory: lottie-preview-plugin
        run: ./gradlew --no-daemon build verifyPlugin buildPlugin -PpluginVersion=${{ steps.resolve-version.outputs.VERSION }}

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: lottie-preview-plugin
          path: lottie-preview-plugin/build/distributions/*.zip
          if-no-files-found: error

      - name: Generate release notes
        if: github.event_name == 'workflow_dispatch' && inputs.release == true && github.actor == github.repository_owner
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_TAG="v${{ steps.resolve-version.outputs.VERSION }}"
          git fetch --tags --force || true
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)

          if [[ -n "$PREVIOUS_TAG" ]]; then
            RANGE="${PREVIOUS_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          notes_file="${RUNNER_TEMP}/release_notes.md"

          {
            echo "## What's Changed"
            echo ""

            FEATS=$(git log "$RANGE" --no-merges --pretty=format:"- %s (%h)" --grep="^feat" 2>/dev/null || true)
            FIXES=$(git log "$RANGE" --no-merges --pretty=format:"- %s (%h)" --grep="^fix" 2>/dev/null || true)
            CI_CHANGES=$(git log "$RANGE" --no-merges --pretty=format:"- %s (%h)" --grep="^ci" 2>/dev/null || true)
            OTHER=$(git log "$RANGE" --no-merges --pretty=format:"- %s (%h)" --grep="^chore\|^docs\|^refactor\|^style\|^test\|^perf\|^build" --extended-regexp 2>/dev/null || true)

            if [[ -n "$FEATS" ]]; then
              echo "### ✨ Features"
              echo "$FEATS"
              echo ""
            fi

            if [[ -n "$FIXES" ]]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            if [[ -n "$CI_CHANGES" ]]; then
              echo "### ⚙️ CI/CD"
              echo "$CI_CHANGES"
              echo ""
            fi

            if [[ -n "$OTHER" ]]; then
              echo "### 🔧 Other Changes"
              echo "$OTHER"
              echo ""
            fi

            if [[ -n "$PREVIOUS_TAG" ]]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
            fi
          } > "$notes_file"

          echo "RELEASE_NOTES_FILE=$notes_file" >> "$GITHUB_ENV"

      - name: Create GitHub release
        if: github.event_name == 'workflow_dispatch' && inputs.release == true && github.actor == github.repository_owner
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.resolve-version.outputs.VERSION }}
          name: Release v${{ steps.resolve-version.outputs.VERSION }}
          body_path: ${{ env.RELEASE_NOTES_FILE }}
          files: lottie-preview-plugin/build/distributions/*.zip
