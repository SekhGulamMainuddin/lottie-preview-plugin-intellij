<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      align-items: center;
      background: #1e1e1e;
      color: #9aa0a6;
      display: flex;
      font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      justify-content: center;
      overflow: hidden;
      width: 100vw;
    }

    #lottie-container {
      align-items: center;
      display: flex;
      height: 100%;
      justify-content: center;
      max-height: 600px;
      max-width: 600px;
      width: 100%;
    }

    #placeholder {
      max-width: 80%;
      text-align: center;
      word-break: break-word;
    }

    svg {
      display: block;
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="filename-overlay" style="position: absolute; top: 10px; left: 10px; font-size: 12px; color: #888; font-family: monospace; z-index: 10; pointer-events: none;"></div>
  <div id="lottie-container">
    <div id="placeholder">Open a Lottie JSON file to preview</div>
  </div>

  <script src="lottie.min.js"></script>
  <script src="dotlottie.js"></script>
  <script>
    var anim = null;
    var loopEnabled = true;
    var speed = 1;
    var isDotLottie = false;

    window.loadLottieBase64 = function(base64, ext) {
      try {
        var binaryString = atob(base64);
        var len = binaryString.length;
        var bytes = new Uint8Array(len);
        for (var i = 0; i < len; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }

        if (ext === 'lottie') {
          loadDotLottieData(bytes.buffer);
        } else {
          var jsonStr = new TextDecoder().decode(bytes);
          var animData = JSON.parse(jsonStr);
          loadLottieData(animData);
        }
      } catch (error) {
        window.showLottieError(error.message || String(error));
      }
    };

    window.showLottieError = function(message) {
      if (anim) {
        anim.destroy();
        anim = null;
      }

      var container = document.getElementById('lottie-container');
      container.innerHTML = '<div id="placeholder"></div>';
      document.getElementById('placeholder').textContent = 'Error: ' + message;
    };

    function loadDotLottieData(arrayBuffer) {
      if (anim) {
        anim.destroy();
        anim = null;
      }

      isDotLottie = true;
      var container = document.getElementById('lottie-container');
      container.innerHTML = '<canvas id="dotlottie-canvas" style="width:100%;height:100%;"></canvas>';

      anim = new DotLottieWeb.DotLottie({
        canvas: document.getElementById('dotlottie-canvas'),
        data: arrayBuffer,
        loop: loopEnabled,
        autoplay: true,
        wasmUrl: 'dotlottie-player.wasm'
      });
      anim.setSpeed(speed);
    }

    function loadLottieData(animData) {
      if (anim) {
        anim.destroy();
        anim = null;
      }

      isDotLottie = false;
      var container = document.getElementById('lottie-container');
      container.innerHTML = '';

      anim = lottie.loadAnimation({
        animationData: animData,
        autoplay: true,
        container: container,
        loop: loopEnabled,
        renderer: 'svg'
      });
      anim.setSpeed(speed);
    }

    window.lottiePlay = function() {
      if (anim) anim.play();
    };

    window.lottiePause = function() {
      if (anim) anim.pause();
    };

    window.lottieStop = function() {
      if (anim) anim.stop();
    };

    window.lottieSetLoop = function(loop) {
      loopEnabled = loop;
      if (anim) {
        if (isDotLottie) anim.setLoop(loop);
        else anim.loop = loop;
      }
    };

    window.lottieSetSpeed = function(nextSpeed) {
      speed = nextSpeed;
      if (anim) anim.setSpeed(nextSpeed);
    };

    window.clearAnimation = function() {
      if (anim) {
        anim.destroy();
        anim = null;
      }

      var container = document.getElementById('lottie-container');
      container.innerHTML = '<div id="placeholder">Open a Lottie JSON file to preview</div>';
    };

    window.setBackgroundColor = function(hexColor) {
      if (hexColor && hexColor[0] !== '#' && /^[0-9A-Fa-f]{3,8}$/.test(hexColor)) {
          hexColor = '#' + hexColor;
      }
      document.body.style.backgroundColor = hexColor;
    };

    window.lottieSetBoundary = function(show) {
      var container = document.getElementById('lottie-container');
      if (show) {
        container.style.border = '1px dashed #888888';
      } else {
        container.style.border = 'none';
      }
    };

    window.setFilenameOverlay = function(filename) {
      document.getElementById('filename-overlay').textContent = filename ? "playing " + filename + " animation" : "";
    };
  </script>
</body>
</html>
